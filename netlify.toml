# Redirect /?ref=* to / (referral parameter URLs)
[[redirects]]
  from = "/"
  to = "/"
  status = 301
  force = true
  [redirects.query]
    ref = ":ref"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com https://checkout.clover.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.clover.com https://checkout.clover.com https://*.fly.dev; frame-src 'self' https://checkout.clover.com; frame-ancestors 'self';"
    Cross-Origin-Opener-Policy = "same-origin"
    X-DNS-Prefetch-Control = "on"
